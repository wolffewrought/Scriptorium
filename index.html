<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scriptorium</title>
<meta name="description" content="Write in your own TTF fonts. Export as TXT or themed PDF scrolls.">
<meta name="theme-color" content="#14100c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%2314100c'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='%23b08d3f' font-family='Georgia,serif'%3E%E2%9C%9F%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#14100c;
  --stone:#211c15;
  --stone-2:#2b2419;
  --brass:#b08d3f;
  --brass-dim:#7d6530;
  --bone:#d9cfba;
  --bone-dim:#9a8f7a;
  --blood:#8a2323;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--ink);
  background-image:radial-gradient(ellipse 120% 80% at 50% -10%, #241d13 0%, var(--ink) 60%);
  color:var(--bone);
  font-family:Georgia,'Times New Roman',serif;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
.wrap{max-width:760px;margin:0 auto;padding:0 12px 90px}

header{
  text-align:center;
  padding:18px 0 10px;
  border-bottom:1px solid var(--brass-dim);
  margin-bottom:14px;
  position:relative;
}
header::after{
  content:"";
  position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
  width:7px;height:7px;background:var(--brass);
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
}
h1{
  font-family:Georgia,serif;
  font-weight:700;
  font-size:clamp(20px,6vw,28px);
  letter-spacing:.28em;
  text-indent:.28em;
  color:var(--brass);
  text-transform:uppercase;
}
header p{color:var(--bone-dim);font-size:12px;font-style:italic;margin-top:2px}
#installBtn{margin-top:9px;background:var(--brass);color:#1a1408;border-color:var(--brass);font-weight:700;padding:9px 18px}

.panel{
  background:var(--stone);
  border:1px solid #3a3122;
  border-radius:var(--radius);
  padding:12px;
  margin-bottom:12px;
}
.label{
  font-family:Georgia,serif;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--brass);
  display:block;
  margin-bottom:8px;
}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

select,input[type=text]{
  background:var(--ink);
  color:var(--bone);
  border:1px solid #453a26;
  border-radius:4px;
  padding:9px 10px;
  font-family:inherit;
  font-size:14px;
  min-width:0;
}
select{flex:1}
select:focus,input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--brass);outline-offset:1px}

button{
  background:var(--stone-2);
  color:var(--bone);
  border:1px solid var(--brass-dim);
  border-radius:4px;
  padding:9px 14px;
  font-family:Georgia,serif;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
}
button:active{transform:translateY(1px)}
button.primary{background:var(--brass);color:#1a1408;border-color:var(--brass);font-weight:700}
button.danger{border-color:var(--blood);color:#c96b6b;padding:9px 10px}
button:disabled{opacity:.4;cursor:not-allowed}

.slider-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.slider-row span{font-size:12px;color:var(--bone-dim);min-width:74px}
.slider-row output{font-size:12px;color:var(--bone);min-width:34px;text-align:right}
input[type=range]{flex:1;accent-color:var(--brass);min-width:0}

.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{
  padding:7px 12px;
  font-size:11px;
  border-radius:20px;
  background:var(--ink);
  border:1px solid #453a26;
  color:var(--bone-dim);
}
.chip[aria-pressed=true]{border-color:var(--brass);color:var(--brass);background:#241d10}

/* the sheet — live preview of the export */
.sheet-frame{padding:14px;background:#0d0a07;border:1px solid #3a3122;border-radius:var(--radius);box-shadow:inset 0 0 30px #000}
#titleInput{width:100%;text-align:center;font-size:20px;border:none;background:transparent;padding:6px}
#sheet{
  width:100%;
  min-height:46vh;
  border:none;
  resize:vertical;
  padding:24px 18px;
  font-size:20px;
  line-height:1.5;
  border-radius:2px;
  box-shadow:0 4px 18px rgba(0,0,0,.6);
}
#sheet:focus{outline:none}

/* live theme skins */
.t-parchment #titleInput,.skin.t-parchment{color:#3a2b17}
.skin.t-parchment{
  background:
    radial-gradient(ellipse at 20% 10%, rgba(120,90,40,.10), transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(100,70,30,.14), transparent 55%),
    radial-gradient(ellipse at 50% 50%, #efe4c8, #dcc99b 90%);
  box-shadow:0 4px 18px rgba(0,0,0,.7), inset 0 0 40px rgba(90,60,20,.25);
}
.t-grimdark #titleInput,.skin.t-grimdark{color:#d8d2c4}
.skin.t-grimdark{
  background:
    radial-gradient(ellipse at 50% 0%, #262220, transparent 60%),
    linear-gradient(#151312,#0c0b0a);
  box-shadow:0 4px 18px rgba(0,0,0,.8), inset 0 0 0 1px #3d2020;
}
.t-gothic #titleInput,.skin.t-gothic{color:#c8a659}
.skin.t-gothic{
  background:
    radial-gradient(ellipse at 50% 20%, #1c2318, transparent 65%),
    linear-gradient(#12160f,#0a0c08);
  box-shadow:0 4px 18px rgba(0,0,0,.8), inset 0 0 0 2px #4a3b1a, inset 0 0 0 5px #0a0c08, inset 0 0 0 6px #33290f;
}
.t-plain #titleInput,.skin.t-plain{color:#111}
.skin.t-plain{background:#fbfaf7}

.fontlist{list-style:none;margin-top:8px}
.fontlist li{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:7px 4px;border-top:1px solid #33291a;font-size:14px;
}
.fontlist li span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fontlist li small{color:var(--bone-dim);font-size:18px}
.empty{color:var(--bone-dim);font-style:italic;font-size:13px;padding:6px 2px}

details.panel summary{list-style:none;cursor:pointer}
details.panel summary::-webkit-details-marker{display:none}
details.panel summary .label{margin-bottom:0;display:inline}
details.panel summary::after{content:" ▾";color:var(--brass-dim);font-size:11px}
details.panel[open] summary{margin-bottom:10px}
.glyphgrid{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.gcell{width:62px;background:var(--ink);border:1px solid #453a26;border-radius:4px;padding:4px;text-align:center;position:relative}
.gcell img{width:100%;height:38px;object-fit:contain;display:block}
.gcell b{font-size:11px;color:var(--bone);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:normal;margin-top:2px}
.gcell button{position:absolute;top:-8px;right:-8px;padding:0;width:20px;height:20px;line-height:18px;font-size:10px;border-radius:50%}
.pvlabel{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--bone-dim);margin:12px 2px 6px}
.preview{padding:24px 18px;border-radius:2px;min-height:50px;white-space:pre-wrap;overflow-wrap:anywhere}
.preview .g{display:inline-block;height:1em;vertical-align:-0.12em}

.exportbar{
  position:fixed;left:0;right:0;bottom:0;
  background:rgba(13,10,7,.96);
  border-top:1px solid var(--brass-dim);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:8px;justify-content:center;
}
.exportbar button{flex:1;max-width:220px;padding:12px}

#toast{
  position:fixed;left:50%;bottom:80px;transform:translateX(-50%);
  background:var(--brass);color:#1a1408;padding:9px 16px;border-radius:4px;
  font-size:13px;opacity:0;pointer-events:none;transition:opacity .3s;max-width:90vw;text-align:center;
}
#toast.show{opacity:1}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Scriptorium</h1>
    <p>Your hand. Your fonts. Your scrolls.</p>
    <button id="installBtn" hidden>⤓ Install app</button>
  </header>

  <section class="panel">
    <span class="label">Font</span>
    <div class="row">
      <select id="fontSelect" aria-label="Active font">
        <option value="">Default serif</option>
      </select>
      <button id="addFontBtn">+ TTF</button>
      <input type="file" id="fontFile" accept=".ttf,.otf,font/ttf,font/otf" hidden multiple>
    </div>
    <ul class="fontlist" id="fontList"></ul>
    <div class="slider-row">
      <span>Size</span>
      <input type="range" id="sizeRange" min="10" max="48" value="20">
      <output id="sizeOut">20</output>
    </div>
    <div class="slider-row">
      <span>Line height</span>
      <input type="range" id="leadRange" min="10" max="26" value="15">
      <output id="leadOut">1.5</output>
    </div>
  </section>

  <details class="panel" id="glyphPanel">
    <summary><span class="label">Font Maker — image glyphs</span></summary>
    <div class="row">
      <select id="gsSelect" aria-label="Glyph set"></select>
      <button id="gsNew">+ Set</button>
      <button id="gsDel" class="danger" aria-label="Delete set">✕</button>
    </div>
    <div class="row" style="margin-top:10px">
      <input type="text" id="gSeq" placeholder="Letter or combo — a, me, ll…" style="flex:1" autocapitalize="off">
      <button id="gAdd">+ Img</button>
      <button id="gBatch">Batch</button>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="gImport" style="flex:1">⟐ Import SVG Font (from Glyphr)</button>
    </div>
    <input type="file" id="gFont" accept=".svg,.gs2,.txt,image/svg+xml" hidden>
    <label class="row" style="margin-top:10px;font-size:13px;gap:6px">
      <input type="checkbox" id="gTint"> Tint glyphs to theme ink
    </label>
    <label class="row" style="margin-top:8px;font-size:13px;gap:6px">
      <input type="checkbox" id="gCase"> Case sensitive (A \u2260 a)
    </label>
    <div class="slider-row">
      <span>Glyph gap</span>
      <input type="range" id="gGap" min="0" max="30" value="4">
      <output id="gGapOut">.04</output>
    </div>
    <div class="glyphgrid" id="gGrid"></div>
    <input type="file" id="gFile" accept="image/*,.svg" hidden>
    <input type="file" id="gFileBatch" accept="image/*,.svg" hidden multiple>
  </details>

  <section class="panel">
    <span class="label">Theme</span>
    <div class="chips" id="themeChips">
      <button class="chip" data-theme="parchment" aria-pressed="true">Parchment</button>
      <button class="chip" data-theme="grimdark" aria-pressed="false">Grimdark</button>
      <button class="chip" data-theme="gothic" aria-pressed="false">Gothic</button>
      <button class="chip" data-theme="plain" aria-pressed="false">Plain</button>
    </div>
  </section>

  <section class="panel" style="padding:11px 12px">
    <label class="row" style="font-size:13px;gap:7px;margin:0;align-items:flex-start">
      <input type="checkbox" id="mdToggle" checked style="margin-top:2px">
      <span>Discord formatting — <b>**bold**</b> <i>*italic*</i> <u>__underline__</u> <s>~~strike~~</s> <code style="font-family:monospace">`code`</code>, plus <b># headings</b> and <b>&gt; quotes</b></span>
    </label>
  </section>

  <section class="sheet-frame t-parchment" id="sheetFrame">
    <input type="text" id="titleInput" placeholder="Title (optional)" aria-label="Document title">
    <textarea id="sheet" class="skin t-parchment" placeholder="Begin your account here…" aria-label="Document body"></textarea>
    <div class="pvlabel" id="pvLabel" hidden>Formatted preview</div>
    <div class="preview skin t-parchment" id="preview" hidden></div>
  </section>
</div>

<div class="exportbar">
  <button id="importBtn" title="Reverse a Scriptorium PDF back to plain text">Open</button>
  <button id="txtBtn">TXT</button>
  <button id="pdfBtn" class="primary">PDF</button>
</div>
<input type="file" id="importPdf" accept="application/pdf,.pdf" hidden>
<div id="toast" role="status"></div>

<script>
"use strict";
/* ---------- state ---------- */
const S = {
  theme:"parchment",
  fontId:"",          // "" = default serif | fontId | "g:<glyphSetId>"
  size:20,
  lead:1.5,
  fonts:new Map()     // id -> {name, buf(ArrayBuffer)}
};
const GS = new Map();  // glyph sets: id -> {name,tint,gap,items:Map(lowerSeq->item),sorted:[keys]}
let mdOn = true;       // Discord-style markdown formatting
let GSedit = null;     // set currently open in the maker panel
const $ = id => document.getElementById(id);
const sheet=$("sheet"), titleInput=$("titleInput"), frame=$("sheetFrame");

function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2400);
}

/* ---------- PWA install + self-diagnostics ---------- */
let deferredPrompt=null;
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(err=>console.warn("SW register failed",err));
}
window.addEventListener("beforeinstallprompt", e=>{ e.preventDefault(); deferredPrompt=e; });
window.addEventListener("appinstalled", ()=>{
  deferredPrompt=null;
  const b=$("installBtn"); if(b) b.hidden=true;
  toast("Installed — find it on your home screen");
});
async function installDiagnostics(){
  const L=[];
  const check=async u=>{ try{ const r=await fetch(u,{cache:"no-store"}); return r.ok?"OK":("MISSING ("+r.status+")"); }catch(e){ return "MISSING (error)"; } };
  L.push("Secure https: "+(location.protocol==="https:"?"yes":"NO"));
  let reg=null; try{ reg=await navigator.serviceWorker.getRegistration(); }catch(e){}
  L.push("Service worker: "+(reg?(navigator.serviceWorker.controller?"active":"registered — reload once"):"NOT registered"));
  L.push("manifest.webmanifest: "+await check("manifest.webmanifest"));
  L.push("icon-192.png: "+await check("icon-192.png"));
  L.push("icon-512.png: "+await check("icon-512.png"));
  L.push("icon-512-maskable.png: "+await check("icon-512-maskable.png"));
  L.push("jspdf.umd.min.js: "+await check("jspdf.umd.min.js"));
  return L.join("\n");
}
document.addEventListener("DOMContentLoaded",()=>{
  const b=$("installBtn"); if(!b) return;
  const standalone=matchMedia("(display-mode: standalone)").matches||navigator.standalone;
  b.hidden=standalone;
  b.onclick=async()=>{
    if(deferredPrompt){
      deferredPrompt.prompt();
      try{ await deferredPrompt.userChoice; }catch(e){}
      deferredPrompt=null; b.hidden=true; return;
    }
    b.textContent="Checking…";
    const rep=await installDiagnostics();
    b.textContent="⤓ Install app";
    const bad=/MISSING|NOT registered|: NO/.test(rep);
    alert("Install readiness\n\n"+rep+"\n\n"+(bad
      ? "Upload the files marked MISSING into the SAME folder as index.html, wait ~1 min for GitHub Pages to rebuild, then reload and tap again."
      : "All good. Open the browser menu (\u2630) \u2192 Add page to \u2192 Home screen. On Samsung Internet that now installs as a real app (no browser badge)."));
  };
});

/* ---------- IndexedDB ---------- */
function db(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("scriptorium",2);
    r.onupgradeneeded=()=>{
      const d=r.result;
      if(!d.objectStoreNames.contains("fonts")) d.createObjectStore("fonts",{keyPath:"id"});
      if(!d.objectStoreNames.contains("kv")) d.createObjectStore("kv");
      if(!d.objectStoreNames.contains("glyphsets")) d.createObjectStore("glyphsets",{keyPath:"id"});
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function idb(store,mode,fn){
  const d=await db();
  return new Promise((res,rej)=>{
    const tx=d.transaction(store,mode), st=tx.objectStore(store), out=fn(st);
    tx.oncomplete=()=>res(out&&out.result!==undefined?out.result:undefined);
    tx.onerror=()=>rej(tx.error);
  });
}
const kvSet=(k,v)=>idb("kv","readwrite",st=>st.put(v,k));
const kvGet=k=>idb("kv","readonly",st=>st.get(k));

/* ---------- fonts ---------- */
async function registerFont(id,name,buf){
  try{
    const face=new FontFace("uf-"+id,buf);
    await face.load();
    document.fonts.add(face);
  }catch(e){ console.warn("FontFace failed",e); }
  S.fonts.set(id,{name,buf});
}
async function loadFontsFromDB(){
  const rows=await idb("fonts","readonly",st=>st.getAll());
  for(const r of (rows||[])) await registerFont(r.id,r.name,r.buf);
}
async function addFontFiles(files){
  for(const f of files){
    const buf=await f.arrayBuffer();
    const id=(Date.now().toString(36)+Math.random().toString(36).slice(2,6));
    const name=f.name.replace(/\.(ttf|otf)$/i,"");
    await idb("fonts","readwrite",st=>st.put({id,name,buf}));
    await registerFont(id,name,buf);
    S.fontId=id;
  }
  renderFonts(); applyState(); persist();
  toast("Font added");
}
async function deleteFont(id){
  await idb("fonts","readwrite",st=>st.delete(id));
  S.fonts.delete(id);
  if(S.fontId===id) S.fontId="";
  renderFonts(); applyState(); persist();
}
function renderFonts(){
  const sel=$("fontSelect"), list=$("fontList");
  sel.innerHTML="";
  const og1=document.createElement("optgroup"); og1.label="Fonts";
  const d=document.createElement("option"); d.value=""; d.textContent="Default serif"; og1.appendChild(d);
  for(const [id,f] of S.fonts){
    const o=document.createElement("option"); o.value=id; o.textContent=f.name; og1.appendChild(o);
  }
  sel.appendChild(og1);
  if(GS.size){
    const og2=document.createElement("optgroup"); og2.label="Glyph sets";
    for(const [id,g] of GS){
      const o=document.createElement("option"); o.value="g:"+id; o.textContent="⟐ "+g.name; og2.appendChild(o);
    }
    sel.appendChild(og2);
  }
  list.innerHTML="";
  if(!S.fonts.size){
    list.innerHTML='<li class="empty">No fonts loaded yet — add a .ttf to write in it.</li>';
  }
  for(const [id,f] of S.fonts){
    const li=document.createElement("li");
    const span=document.createElement("span"); span.textContent=f.name;
    const del=document.createElement("button"); del.className="danger"; del.textContent="✕";
    del.setAttribute("aria-label","Remove "+f.name);
    del.onclick=()=>{ if(confirm('Remove font "'+f.name+'"?')) deleteFont(id); };
    li.append(span,del); list.appendChild(li);
  }
  sel.value=S.fontId;
  if(sel.value!==S.fontId){ S.fontId=""; sel.value=""; }
}

/* ---------- glyph sets (image font maker) ---------- */
function activeGS(){
  return S.fontId&&S.fontId.startsWith("g:") ? GS.get(S.fontId.slice(2)) : null;
}
function rebuildSorted(g){
  g.sorted=[...g.items.keys()].sort((a,b)=>b.length-a.length);
  // comparison strings honour the set's case mode; keys stay exact-case
  g.cmp=g.sorted.map(k=>({key:k, m: g.cs ? k : k.toLowerCase()}));
}
function tokenize(text,g){
  const out=[]; let i=0, buf="";
  const cs=!!g.cs;
  const hay = cs ? text : text.toLowerCase();
  const cmp = g.cmp || [];
  while(i<text.length){
    let hitKey=null, hitLen=0;
    for(let s=0;s<cmp.length;s++){
      const m=cmp[s].m;
      if(m && hay.startsWith(m,i)){ hitKey=cmp[s].key; hitLen=m.length; break; }
    }
    if(hitKey){
      if(buf){ out.push({t:buf}); buf=""; }
      out.push({g:hitKey});
      i+=hitLen;
    }else{
      buf+=text[i]; i++;
    }
  }
  if(buf) out.push({t:buf});
  return out;
}
async function hydrateItem(it){
  it.url=URL.createObjectURL(it.blob);
  const img=new Image();
  img.src=it.url;
  try{ await img.decode(); }catch(e){}
  it.img=img;
  it.aspect=(img.naturalWidth&&img.naturalHeight)?img.naturalWidth/img.naturalHeight:1;
}
async function loadGlyphSets(){
  const rows=await idb("glyphsets","readonly",st=>st.getAll());
  for(const r of (rows||[])){
    const g={name:r.name,tint:!!r.tint,gap:r.gap||0,cs:!!r.cs,items:new Map(),sorted:[],cmp:[]};
    for(const it of (r.items||[])){
      const item={seq:it.seq,blob:it.blob};
      await hydrateItem(item);
      g.items.set(it.seq,item);            // exact-case key
    }
    rebuildSorted(g);
    GS.set(r.id,g);
  }
  if(GS.size&&!GSedit) GSedit=GS.keys().next().value;
}
function saveSet(id){
  const g=GS.get(id); if(!g) return;
  const rec={id,name:g.name,tint:!!g.tint,gap:g.gap||0,cs:!!g.cs,
    items:[...g.items.values()].map(it=>({seq:it.seq,blob:it.blob}))};
  idb("glyphsets","readwrite",st=>st.put(rec)).catch(e=>console.warn(e));
}
async function addMapping(seq,blob){
  const g=GS.get(GSedit); if(!g||!seq) return;
  const key=seq;                            // exact-case key
  const old=g.items.get(key);
  if(old&&old.url) URL.revokeObjectURL(old.url);
  const item={seq,blob};
  await hydrateItem(item);
  g.items.set(key,item);
  rebuildSorted(g);
  saveSet(GSedit);
  renderGS(); refreshPreview();
}
function removeMapping(key){
  const g=GS.get(GSedit); if(!g) return;
  const it=g.items.get(key);
  if(it&&it.url) URL.revokeObjectURL(it.url);
  g.items.delete(key);

/* ---------- Discord markdown ---------- */
const BLOCK={ h1:{m:1.55,bold:true,gap:0.25}, h2:{m:1.3,bold:true,gap:0.2}, h3:{m:1.12,bold:true,gap:0.15},
              sub:{m:0.82,dim:true}, quote:{m:1,indent:true}, p:{m:1} };
const MD_DELIMS=[["***",["b","i"]],["**",["b"]],["*",["i"]],["__",["u"]],["_",["i"]],["~~",["s"]],["`",["code"]]];
function isWordChar(ch){ return !!ch && /\w/.test(ch); }
function parseInline(str){
  str=str||"";
  if(!mdOn) return [{t:str}];
  const runs=[], stack=[];
  let i=0, buf="";
  const flags=()=>{ const f={}; for(const e of stack) for(const k of e.ks) f[k]=true; return f; };
  const flush=()=>{ if(buf){ runs.push(Object.assign({t:buf},flags())); buf=""; } };
  const codeOpen=()=>stack.length&&stack[stack.length-1].d==="`";
  while(i<str.length){
    if(codeOpen()){
      if(str[i]==="`"){ flush(); stack.pop(); i++; } else { buf+=str[i]; i++; }
      continue;
    }
    if(str[i]==="\\"&&i+1<str.length){ buf+=str[i+1]; i+=2; continue; }
    let d=null,ks=null;
    for(const m of MD_DELIMS){ if(str.startsWith(m[0],i)){ d=m[0]; ks=m[1]; break; } }
    if(d){
      let idx=-1;
      for(let s=stack.length-1;s>=0;s--){ if(stack[s].d===d){ idx=s; break; } }
      if(d==="_"||d==="__"){                 // intraword underscore guard
        const prev=str[i-1], next=str[i+d.length];
        if(idx>=0){ if(isWordChar(next)){ buf+=d; i+=d.length; continue; } }
        else { if(isWordChar(prev)){ buf+=d; i+=d.length; continue; } }
      }
      flush();
      if(idx>=0) stack.length=idx; else stack.push({d,ks});
      i+=d.length;
    }else{ buf+=str[i]; i++; }
  }
  flush();
  return runs.length?runs:[{t:""}];
}
function parseBlocks(text){
  const lines=(text||"").replace(/\r/g,"").split("\n");
  return lines.map(line=>{
    if(!mdOn) return {type:"p",runs:[{t:line}]};
    let type="p", c=line, mm;
    if(mm=line.match(/^###\s+(.*)$/)) { type="h3"; c=mm[1]; }
    else if(mm=line.match(/^##\s+(.*)$/)) { type="h2"; c=mm[1]; }
    else if(mm=line.match(/^#\s+(.*)$/)) { type="h1"; c=mm[1]; }
    else if(mm=line.match(/^-#\s+(.*)$/)) { type="sub"; c=mm[1]; }
    else if(mm=line.match(/^>\s+(.*)$/)) { type="quote"; c=mm[1]; }
    return {type, runs:parseInline(c)};
  });
}
function hasMarkup(text){
  return mdOn && (/[*_~`\\]/.test(text||"") || /^(#{1,3}\s|>\s|-#\s)/m.test(text||""));

function blankRuns(runs){ return !runs.length || (runs.length===1 && !runs[0].t); }

function styleSpan(run){
  const el=document.createElement("span");
  if(run.b) el.style.fontWeight="700";
  if(run.i) el.style.fontStyle="italic";
  const deco=[]; if(run.u) deco.push("underline"); if(run.s) deco.push("line-through");
  if(deco.length) el.style.textDecoration=deco.join(" ");
  if(run.code){ el.style.fontFamily="ui-monospace,Consolas,monospace"; el.style.fontSize="0.92em"; }
  return el;
}
function renderRunsInto(parent, runs, g){
  for(const run of runs){
    const span=styleSpan(run);
    if(g && !run.code){
      for(const tk of tokenize(run.t||"",g)){
        if(tk.g!==undefined){ const it=g.items.get(tk.g); if(it){ span.appendChild(glyphEl(g,it)); continue; } }
        span.appendChild(document.createTextNode(tk.t||""));
      }
    }else{
      span.appendChild(document.createTextNode(run.t||""));
    }
    parent.appendChild(span);
  }
}

/* ---- import a Glyphr SVG Font: every outline -> image glyph, ligatures -> combos ---- */
const SVGNS="http://www.w3.org/2000/svg";
function fontGlyphToSvgBlob(measurePath,d){
  measurePath.setAttribute("d",d);
  let bb; try{ bb=measurePath.getBBox(); }catch(e){ return null; }
  if(!(bb.width>0&&bb.height>0)) return null;          // space / empty outline
  const pad=Math.max(bb.width,bb.height)*0.06;
  const minX=bb.x-pad, w=bb.width+pad*2, h=bb.height+pad*2;
  const maxY=bb.y+bb.height+pad;
  const svg=document.createElementNS(SVGNS,"svg");
  svg.setAttribute("xmlns",SVGNS);
  svg.setAttribute("width",w.toFixed(2));
  svg.setAttribute("height",h.toFixed(2));
  svg.setAttribute("viewBox",minX.toFixed(2)+" "+(-maxY).toFixed(2)+" "+w.toFixed(2)+" "+h.toFixed(2));
  const g=document.createElementNS(SVGNS,"g");
  g.setAttribute("transform","scale(1,-1)");            // font y-up -> screen y-down
  const p=document.createElementNS(SVGNS,"path");
  p.setAttribute("d",d); p.setAttribute("fill","#000");
  g.appendChild(p); svg.appendChild(g);
  return new Blob([new XMLSerializer().serializeToString(svg)],{type:"image/svg+xml"});
}
async function importSvgFont(text){
  let xdoc;
  try{ xdoc=new DOMParser().parseFromString(text,"image/svg+xml"); }catch(e){ toast("Couldn't parse the SVG"); return; }
  const glyphs=xdoc.getElementsByTagName("glyph");
  if(!glyphs.length){ toast("No <glyph> elements found — export as SVG Font from Glyphr (not OTF/TTF)"); return; }
  const g=GS.get(GSedit); if(!g) return;
  const meas=document.createElementNS(SVGNS,"svg");
  meas.setAttribute("style","position:absolute;left:-9999px;top:-9999px;width:10px;height:10px;overflow:hidden");
  const mp=document.createElementNS(SVGNS,"path");
  meas.appendChild(mp); document.body.appendChild(meas);
  let added=0,collide=0,skipped=0;
  for(const gl of glyphs){
    const uni=gl.getAttribute("unicode");
    const d=gl.getAttribute("d");
    if(!uni||!d||!d.trim()){ skipped++; continue; }
    const blob=fontGlyphToSvgBlob(mp,d);
    if(!blob){ skipped++; continue; }
    const key=uni;                          // exact-case key
    if(g.items.has(key)){ collide++; const o=g.items.get(key); if(o.url) URL.revokeObjectURL(o.url); }
    const item={seq:uni,blob};
    await hydrateItem(item);
    g.items.set(key,item);
    added++;
  }
  document.body.removeChild(meas);
  if(added) g.tint=true;                                // font glyphs are black silhouettes -> tint to theme ink
  rebuildSorted(g); saveSet(GSedit);
  S.fontId="g:"+GSedit;
  renderFonts(); renderGS(); applyState(); persist();
  toast("Imported "+added+" glyph"+(added===1?"":"s")+(collide?", "+collide+" replaced":"")+(skipped?", "+skipped+" skipped":""));
}

      }
      for(let i=0;i<12;i++){ // scratches
        x.strokeStyle=`rgba(120,110,100,${0.03+Math.random()*0.05})`;
        x.lineWidth=0.6;
        x.beginPath();
        const sx=Math.random()*W, sy=Math.random()*H;
        x.moveTo(sx,sy); x.lineTo(sx+(Math.random()-0.5)*W*0.5, sy+(Math.random()-0.5)*H*0.3);
        x.stroke();
      }
    },
    frame(doc,W,H){
      const steel=[86,80,70], dark=[38,35,31], blood=[128,34,34], bone=[150,140,126];
      const OUT=8, IN=17, cxm=W/2;
      doc.setLineCap("butt"); doc.setLineJoin("miter");
      // outer + inner rules; text sits inside the inner rule
      doc.setDrawColor(...steel); doc.setLineWidth(1.4); doc.rect(OUT,OUT,W-2*OUT,H-2*OUT);
      doc.setLineWidth(0.5); doc.rect(IN,IN,W-2*IN,H-2*IN);
      // heavy accent bars top & bottom, inside band
      doc.setLineWidth(1.4); doc.line(OUT,11.5,W-OUT,11.5); doc.line(OUT,H-11.5,W-OUT,H-11.5);
      // oxblood rails
      doc.setDrawColor(...blood); doc.setLineWidth(0.7); doc.line(30,14,W-30,14); doc.line(30,H-14,W-30,H-14);
      // reticle brackets along the outer rule
      doc.setDrawColor(...bone); doc.setLineWidth(1.1);
      const L=22,o=OUT;
      doc.line(o,o,o+L,o); doc.line(o,o,o,o+L);
      doc.line(W-o,o,W-o-L,o); doc.line(W-o,o,W-o,o+L);
      doc.line(o,H-o,o+L,H-o); doc.line(o,H-o,o,H-o-L);
      doc.line(W-o,H-o,W-o-L,H-o); doc.line(W-o,H-o,W-o,H-o-L);
      // rivets across bars, corners, sides
      const n=8;
      for(let i=0;i<=n;i++){ const x=30+(W-60)*i/n; _bolt(doc,x,11.5,1.4,dark,bone); _bolt(doc,x,H-11.5,1.4,dark,bone); }
      [[o,o],[W-o,o],[o,H-o],[W-o,H-o]].forEach(([x,y])=>_bolt(doc,x,y,1.8,dark,bone));
      _bolt(doc,OUT,H/2,1.4,dark,bone); _bolt(doc,W-OUT,H/2,1.4,dark,bone);
      // hazard chevrons + diamonds, inside band
      doc.setDrawColor(...blood); doc.setLineWidth(1.1);
      doc.line(cxm-5,11.5,cxm,15.5); doc.line(cxm,15.5,cxm+5,11.5);
      doc.line(cxm-5,H-11.5,cxm,H-15.5); doc.line(cxm,H-15.5,cxm+5,H-11.5);
      doc.setFillColor(...blood); _diamond(doc,cxm,11.5,1.9,"F"); _diamond(doc,cxm,H-11.5,1.9,"F");
    }
  },
  gothic:{ ink:[200,166,89], title:[212,182,110], margin:22,
    bg(c){
      const x=c.getContext("2d"),W=c.width,H=c.height;
      const g=x.createRadialGradient(W/2,H*0.25,0,W/2,H/2,H*0.8);
      g.addColorStop(0,"#161c11"); g.addColorStop(1,"#080a06");
      x.fillStyle=g; x.fillRect(0,0,W,H);
      for(let i=0;i<2000;i++){
        x.fillStyle=`rgba(200,180,90,${Math.random()*0.02})`;
        x.fillRect(Math.random()*W,Math.random()*H,1,1);
      }
    },
    frame(doc,W,H){
      const gold=[160,132,60], bright=[205,170,95], dark=[70,56,24];
      const OUT=8, IN=17, midY=H/2;
      doc.setLineJoin("round"); doc.setLineCap("round");
      doc.setDrawColor(...dark); doc.setLineWidth(1.6); doc.rect(OUT-1.2,OUT-1.2,W-2*(OUT-1.2),H-2*(OUT-1.2));
      doc.setDrawColor(...gold); doc.setLineWidth(0.7); doc.rect(OUT,OUT,W-2*OUT,H-2*OUT);
      doc.setLineWidth(0.4); doc.rect(IN,IN,W-2*IN,H-2*IN);
      // beadwork along the outer gold rule
      doc.setFillColor(...gold);
      _bead(doc,OUT,OUT,W-OUT,OUT,6,0.5); _bead(doc,OUT,H-OUT,W-OUT,H-OUT,6,0.5);
      _bead(doc,OUT,OUT,OUT,H-OUT,6,0.5); _bead(doc,W-OUT,OUT,W-OUT,H-OUT,6,0.5);
      // corner rosettes at outer corners
      [[OUT,OUT],[W-OUT,OUT],[OUT,H-OUT],[W-OUT,H-OUT]].forEach(([cx,cy])=>{
        doc.setFillColor(...bright); doc.circle(cx,cy,1.6,"F");
        doc.setFillColor(...gold); [[2.5,0],[-2.5,0],[0,2.5],[0,-2.5]].forEach(([dx,dy])=>doc.circle(cx+dx,cy+dy,1.0,"F"));
        doc.setFillColor(...dark); doc.circle(cx,cy,0.6,"F");
      });
      // cathedral arches spring from the inner rule, rising outward into the band
      doc.setDrawColor(...gold); doc.setLineWidth(0.5);
      const inset=26, cells=9, cw=(W-2*inset)/cells, aw=cw*0.86, rk=0.42;
      for(let i=0;i<cells;i++){
        const x=inset+i*cw+(cw-aw)/2;
        _arch(doc,x,IN,aw,rk); _arch(doc,x,H-IN,aw,-rk);
        doc.setFillColor(...bright);
        doc.circle(x+aw/2,IN-0.866*aw*rk,0.55,"F"); doc.circle(x+aw/2,H-IN+0.866*aw*rk,0.55,"F");
      }
      // side fleurs mid-band
      doc.setFillColor(...gold);
      _diamond(doc,OUT+3.5,midY,1.8,"F"); _diamond(doc,W-OUT-3.5,midY,1.8,"F");
      doc.setFillColor(...bright);
      [[OUT+3.5,midY-5],[OUT+3.5,midY+5],[W-OUT-3.5,midY-5],[W-OUT-3.5,midY+5]].forEach(([x,y])=>doc.circle(x,y,0.7,"F"));
      doc.setLineCap("butt"); doc.setLineJoin("miter");
    }
  },
  plain:{ ink:[17,17,17], title:[17,17,17], margin:20, bg:null, frame:null }
};
function themeBgData(name){
  const t=THEMES[name]; if(!t.bg) return null;
  const c=document.createElement("canvas"); c.width=794; c.height=1123; // A4 @96dpi
  t.bg(c);
  return c.toDataURL("image/jpeg",0.82);
}
function bufToB64(buf){
  const u=new Uint8Array(buf); let s="";
  for(let i=0;i<u.length;i+=0x8000) s+=String.fromCharCode.apply(null,u.subarray(i,i+0x8000));
  return btoa(s);
}
function b64ToText(b64){
  const bin=atob(b64), u=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(u);
}

/* ---------- PDF export ---------- */
function isCFF(buf){ // 'OTTO' = CFF outlines; jsPDF can't embed these as vectors
  try{ return new DataView(buf).getUint32(0)===0x4F54544F; }catch(e){ return false; }
}
function wrapCanvas(ctx,text,maxPx){
  const words=text.split(/\s+/).filter(Boolean);
  const lines=[]; let cur="";
  for(const w of words){
    const test=cur?cur+" "+w:w;
    if(ctx.measureText(test).width<=maxPx||!cur) cur=test;
    else{ lines.push(cur); cur=w; }
  }
  if(cur) lines.push(cur);
  return lines.length?lines:[""];
}
$("pdfBtn").onclick=async()=>{
  const btn=$("pdfBtn");
  btn.disabled=true; btn.textContent="Binding…";
  try{
    if(!window.jspdf){ toast("jspdf.umd.min.js is missing — upload it next to index.html"); return; }
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"mm",format:"a4"});
    const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
    const t=THEMES[S.theme];
    const bg=themeBgData(S.theme);
    const paintPage=()=>{
      if(bg) doc.addImage(bg,"JPEG",0,0,W,H,undefined,"FAST");
      if(t.frame) t.frame(doc,W,H);
    };
    const margin=t.margin, maxW=W-margin*2, bottom=H-margin;
    const pt=S.size*0.75*1.1;                 // px→pt, nudged for print
    const lineH=pt*S.lead*0.3528;             // pt→mm
    const title=titleInput.value.trim();
    const paras=sheet.value.replace(/\r/g,"").split("\n");

    // decide render path: vector-embed the TTF, or draw via canvas (styles/glyphs/OTF need canvas)
    const gsActive=activeGS();
    const needsRich = hasMarkup(title) || hasMarkup(sheet.value);
    let fontName="times", vector=true;
    if(gsActive || needsRich){ vector=false; }
    else if(S.fontId&&S.fonts.has(S.fontId)){
      const f=S.fonts.get(S.fontId);
      if(isCFF(f.buf)){ vector=false; }
      else{
        try{
          doc.addFileToVFS("user.ttf",bufToB64(f.buf));
          doc.addFont("user.ttf","UserFont","normal");
          fontName="UserFont";
        }catch(e){ console.warn("embed failed, using canvas",e); vector=false; }
      }
    }

    if(vector){
      paintPage();
      let y=margin+4;
      doc.setFont(fontName,"normal");
      if(title){
        doc.setFontSize(pt*1.5);
        doc.setTextColor(...t.title);
        for(const ln of doc.splitTextToSize(title,maxW)){
          if(y>bottom){ doc.addPage(); paintPage(); y=margin+4; }
          doc.text(ln,W/2,y,{align:"center"});
          y+=lineH*1.5;
        }
        y+=lineH*0.6;
      }
      doc.setFontSize(pt);
      doc.setTextColor(...t.ink);
      for(const p of paras){
        if(p===""){ y+=lineH; if(y>bottom){ doc.addPage(); paintPage(); y=margin+4; } continue; }
        for(const ln of doc.splitTextToSize(p,maxW)){
          if(y>bottom){ doc.addPage(); paintPage(); y=margin+4; }
          doc.text(ln,margin,y);
          y+=lineH;
        }
      }
    }else{
      // canvas path: browser renders text/glyph images, embedded as page images
      const k=1588/W;                          // canvas px per mm (2x A4)
      const CW=1588, CH=Math.round(H*k);
      const px=pt*0.3528*k;
      const lineHpx=lineH*k, marginPx=margin*k, maxPx=maxW*k, bottomPx=CH-margin*k;
      const rgb=a=>"rgb("+a[0]+","+a[1]+","+a[2]+")";
      const rgba=(a,al)=>"rgba("+a[0]+","+a[1]+","+a[2]+","+al+")";
      const famFB="Georgia,serif";
      const fam=(S.fontId&&S.fonts.has(S.fontId))?('"uf-'+S.fontId+'",Georgia,serif'):famFB;
      const baseFam=gsActive?famFB:fam;
      if(!gsActive){
        await document.fonts.load(px+"px "+fam).catch(()=>{});
        await document.fonts.load("700 "+px+"px "+fam).catch(()=>{});
        await document.fonts.load("italic "+px+"px "+fam).catch(()=>{});
      }
      const inkCol=rgb(t.ink), titleCol=rgb(t.title);

      const pages=[];
      const newPage=()=>{
        const c=document.createElement("canvas"); c.width=CW; c.height=CH;
        const x=c.getContext("2d"); x.textBaseline="alphabetic";
        pages.push(c); return x;
      };
      let x=newPage(), y=marginPx+4*k;
      const fresh=()=>{ if(y>bottomPx){ x=newPage(); y=marginPx+4*k; } };

      function tintedImg(it,color){
        it._tc=it._tc||{};
        if(it._tc[color]) return it._tc[color];
        const w=Math.max(1,it.img.naturalWidth||100), h=Math.max(1,it.img.naturalHeight||100);
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        const cx=c.getContext("2d");
        cx.drawImage(it.img,0,0,w,h);
        cx.globalCompositeOperation="source-in";
        cx.fillStyle=color; cx.fillRect(0,0,w,h);
        it._tc[color]=c; return c;
      }
      function fontStr(st,fpx){
        let s=""; if(st&&st.i) s+="italic "; if(st&&st.b) s+="700 ";
        return s+fpx+"px "+((st&&st.code)?"ui-monospace, Consolas, monospace":baseFam);
      }
      function atomizeRuns(ctx,runs,fpx){
        const out=[], gapPx=(gsActive?(gsActive.gap||0):0)*fpx;
        for(const run of runs){
          const st={b:!!run.b,i:!!run.i,u:!!run.u,s:!!run.s,code:!!run.code};
          ctx.font=fontStr(st,fpx);
          const pushText=p=>{ if(!p) return; const w=ctx.measureText(p).width; out.push(/^\s+$/.test(p)?{sp:1,w,st}:{tx:p,w,st}); };
          if(gsActive && !st.code){
            for(const tk of tokenize(run.t||"",gsActive)){
              if(tk.g!==undefined){ const it=gsActive.items.get(tk.g); if(it){ out.push({g:it,iw:it.aspect*fpx,w:it.aspect*fpx+gapPx,st}); continue; } }
              for(const p of (tk.t||"").split(/(\s+)/)) pushText(p);
            }
          }else{
            for(const p of (run.t||"").split(/(\s+)/)) pushText(p);
          }
        }
        return out;
      }
      function toLines(at,maxw){
        const ls=[]; let cur=[], cw=0;
        for(const a of at){
          if(a.sp){ if(cw+a.w>maxw){ ls.push(cur); cur=[]; cw=0; } else if(cur.length){ cur.push(a); cw+=a.w; } continue; }
          if(cw+a.w>maxw&&cur.length){ while(cur.length&&cur[cur.length-1].sp){ cw-=cur.pop().w; } ls.push(cur); cur=[]; cw=0; }
          cur.push(a); cw+=a.w;
        }
        if(cur.length||!ls.length) ls.push(cur);
        return ls;
      }
      function drawStyledLine(ctx,line,x0,yy,fpx,color,center,maxw){
        let lw=0; for(const a of line) lw+=a.w;
        let cx=center?x0+(maxw-lw)/2:x0;
        ctx.textAlign="left";
        const pos=[];
        for(const a of line){
          pos.push(cx);
          const st=a.st||{};
          if(a.g){
            const src=(gsActive&&gsActive.tint)?tintedImg(a.g,color):a.g.img;
            ctx.drawImage(src,cx,yy-fpx,a.iw,fpx);
          }else if(a.tx){
            ctx.font=fontStr(st,fpx); ctx.fillStyle=color; ctx.fillText(a.tx,cx,yy);
          }
          cx+=a.w;
        }
        // continuous underline / strikethrough across each styled span
        ctx.strokeStyle=color; ctx.lineWidth=Math.max(1,fpx*0.05);
        const decorate=key=>{
          let i=0;
          while(i<line.length){
            if(!line[i].sp && line[i].st && line[i].st[key]){
              const start=pos[i]; let end=pos[i]+line[i].w, j=i+1, glyph=!!line[i].g;
              while(j<line.length && line[j].st && line[j].st[key]){ if(line[j].g) glyph=true; end=pos[j]+line[j].w; j++; }
              const inset=fpx*0.05;
              const dy = key==="u" ? fpx*0.15 : (glyph ? -fpx*0.45 : -fpx*0.28);
              ctx.beginPath(); ctx.moveTo(start+inset,yy+dy); ctx.lineTo(Math.max(start+inset,end-inset),yy+dy); ctx.stroke();
              i=j;
            } else i++;
          }
        };
        decorate("u"); decorate("s");
      }
      // title (inline-styled, centered)
      if(title){
        const tpx=px*1.5, tRuns=parseInline(title);
        for(const l of toLines(atomizeRuns(x,tRuns,tpx),maxPx)){
          fresh(); drawStyledLine(x,l,marginPx,y,tpx,titleCol,true,maxPx); y+=lineHpx*1.5;
        }
        y+=lineHpx*0.6;
      }
      // body blocks: headings, quotes, subtext, styled runs
      for(const blk of parseBlocks(sheet.value)){
        const bs=BLOCK[blk.type]||BLOCK.p;
        if(blankRuns(blk.runs)){ y+=lineHpx; fresh(); continue; }
        const fpx=px*(bs.m||1), lh=lineHpx*(bs.m||1), indent=bs.indent?6*k:0;
        const runs=bs.bold?blk.runs.map(r=>Object.assign({},r,{b:true})):blk.runs;
        const col=bs.dim?rgba(t.ink,0.62):inkCol;
        for(const l of toLines(atomizeRuns(x,runs,fpx),maxPx-indent)){
          fresh();
          if(bs.indent){ x.strokeStyle=rgba(t.ink,0.5); x.lineWidth=2*k; x.beginPath(); x.moveTo(marginPx+2*k,y-fpx*0.82); x.lineTo(marginPx+2*k,y+fpx*0.15); x.stroke(); }
          drawStyledLine(x,l,marginPx+indent,y,fpx,col,false,maxPx-indent);
          y+=lh;
        }
        if(bs.gap) y+=lineHpx*bs.gap;
      }
      pages.forEach((c,i)=>{
        if(i>0) doc.addPage();
        paintPage();
        doc.addImage(c.toDataURL("image/png"),"PNG",0,0,W,H);
      });
      toast(gsActive?"Glyph script rendered":(needsRich?"Formatted PDF saved":"Font rendered as image — text not selectable"));
    }
    // embed original text invisibly so the app can reverse it later
    let fontLabel="Default serif";
    if(gsActive) fontLabel="glyphs: "+GS.get(S.fontId.slice(2)).name;
    else if(S.fontId&&S.fonts.has(S.fontId)) fontLabel=S.fonts.get(S.fontId).name;
    const meta={v:1,title:titleInput.value,text:sheet.value,font:fontLabel,theme:S.theme,at:new Date().toISOString()};
    const b64=bufToB64(new TextEncoder().encode(JSON.stringify(meta)).buffer);
    const pdfBuf=doc.output("arraybuffer");
    const mk=new TextEncoder().encode("\n%%SCRIPTORIUM:"+b64+":END%%\n");
    const outArr=new Uint8Array(pdfBuf.byteLength+mk.length);
    outArr.set(new Uint8Array(pdfBuf),0);
    outArr.set(mk,pdfBuf.byteLength);
    download(new Blob([outArr],{type:"application/pdf"}),safeName()+".pdf");
    if(vector) toast("PDF saved");
  }catch(e){
    console.error(e);
    toast("PDF failed: "+(e.message||e));
  }finally{
    btn.disabled=false; btn.textContent="PDF";
  }
};

/* ---------- boot ---------- */
(async function(){
  try{
    await loadFontsFromDB();
    await loadGlyphSets();
    const doc=await kvGet("doc");
    if(doc){
      titleInput.value=doc.title||"";
      sheet.value=doc.text||"";
      S.theme=doc.theme||"parchment";
      const fid=doc.fontId||"";
      S.fontId=(fid&&(S.fonts.has(fid)||(fid.startsWith("g:")&&GS.has(fid.slice(2)))))?fid:"";
      S.size=doc.size||20; S.lead=doc.lead||1.5;
      if(doc.md===false) mdOn=false;
      $("sizeRange").value=S.size; $("leadRange").value=Math.round(S.lead*10);
      $("mdToggle").checked=mdOn;
    }
  }catch(e){ console.warn(e); }
  renderFonts(); renderGS(); applyState();
})();
</script>
